<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>Cartly Login</title><style>

body{
font-family:Arial, sans-serif;
background:#f3f3f3;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:340px;
background:white;
padding:30px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.12);
text-align:center;
}

.logo{
font-size:28px;
font-weight:bold;
color:#ff7a3d;
margin-bottom:5px;
}

.subtitle{
font-size:14px;
color:#777;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
}

input:focus{
outline:none;
border-color:#ff7a3d;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
margin-top:8px;
font-size:15px;
cursor:pointer;
}

.signup{
background:#ff7a3d;
color:white;
}

.login{
background:#333;
color:white;
}

.link{
margin-top:12px;
font-size:13px;
color:#666;
cursor:pointer;
}

.link:hover{
text-decoration:underline;
}

</style></head><body><div class="card"><div class="logo">Cartly 🛒</div>
<div class="subtitle">Login or Create your account</div><input type="email" id="email" placeholder="Enter Email"><input type="password" id="password" placeholder="Enter Password"><input type="password" id="confirmPassword" placeholder="Confirm Password (Signup only)"><button class="signup" onclick="signup()">Sign Up</button>

<button class="login" onclick="login()">Login</button>

<div class="link" onclick="resetPassword()">Forgot Password?</div></div><script type="module" src="login.js"></script></body>
</html>
