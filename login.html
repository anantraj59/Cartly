<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartly Login</title><style>
#splash{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:linear-gradient(135deg,#ff4b2b,#ff416c);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
z-index:9999;
text-align:center;
}

.logo{
font-size:70px;
animation:cartBounce 1.5s infinite;
}

#splash h1{
font-size:34px;
margin-top:10px;
}

#splash p{
opacity:0.8;
margin-top:5px;
}

.loading-dots{
margin-top:20px;
}

.loading-dots span{
display:inline-block;
width:10px;
height:10px;
background:white;
border-radius:50%;
margin:5px;
animation:dotBounce 1.4s infinite;
}

.loading-dots span:nth-child(2){
animation-delay:0.2s;
}

.loading-dots span:nth-child(3){
animation-delay:0.4s;
}

@keyframes cartBounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-15px);}
}

@keyframes dotBounce{
0%,80%,100%{transform:scale(0);}
40%{transform:scale(1);}
}
*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial;
}

body{
background:#f6f5f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#fff;
border-radius:10px;
box-shadow:0 14px 28px rgba(0,0,0,0.25);
width:800px;
max-width:100%;
min-height:480px;
position:relative;
overflow:hidden;
}

.form-container{
position:absolute;
top:0;
height:100%;
transition:0.6s ease-in-out;
}

.sign-in-container{
left:0;
width:50%;
z-index:2;
}

.sign-up-container{
left:0;
width:50%;
opacity:0;
z-index:1;
}

.container.right-panel-active .sign-in-container{
transform:translateX(100%);
}

.container.right-panel-active .sign-up-container{
transform:translateX(100%);
opacity:1;
z-index:5;
}

form{
background:#fff;
display:flex;
flex-direction:column;
padding:0 40px;
height:100%;
justify-content:center;
align-items:center;
text-align:center;
}

input{
background:#eee;
border:none;
padding:12px;
margin:8px 0;
width:100%;
}

button{
border:none;
padding:12px 45px;
background:#ff4b2b;
color:white;
border-radius:20px;
cursor:pointer;
}

.overlay-container{
position:absolute;
top:0;
left:50%;
width:50%;
height:100%;
overflow:hidden;
transition:0.6s ease-in-out;
}

.overlay{
background:linear-gradient(to right,#ff4b2b,#ff416c);
color:white;
position:relative;
left:-100%;
height:100%;
width:200%;
transform:translateX(0);
transition:0.6s ease-in-out;
}

.container.right-panel-active .overlay{
transform:translateX(50%);
}

.overlay-panel{
position:absolute;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:0 40px;
height:100%;
width:50%;
}

.overlay-left{
transform:translateX(-20%);
}

.overlay-right{
right:0;
}

</style></head><body>
<div id="splash">

<div class="logo">
🛒
</div>

<h1>Cartly</h1>
<p>Your Smart Shopping Partner</p>

<div class="loading-dots">
<span></span>
<span></span>
<span></span>
</div>

</div>
<div class="container" id="container"><div class="form-container sign-up-container">
  <form onsubmit="event.preventDefault(); signup();">

<h2>Create Account</h2>

<input type="text" placeholder="Name">

<input id="signupEmail" type="email" placeholder="Email" required>

<input id="signupPassword" type="password" placeholder="Password" required>

<input id="confirmPassword" type="password" placeholder="Confirm Password" required>

<button type="submit">Sign Up</button>

</form>
</div><div class="form-container sign-in-container">
<form onsubmit="event.preventDefault(); login();">

<h2>Sign In</h2>

<input id="loginEmail" type="email" placeholder="Email" required>

<input id="loginPassword" type="password" placeholder="Password" required>

<button type="submit">Sign In</button>

<p onclick="resetPassword()" style="margin-top:10px;cursor:pointer;color:#ff4b2b;">
Forgot Password?
</p>

</form>
</div><div class="overlay-container">
<div class="overlay"><div class="overlay-panel overlay-left">
<h2>Welcome Back!</h2>
<p>To keep connected please login</p>
<button id="signIn">Sign In</button>
</div><div class="overlay-panel overlay-right">
<h2>Hello Friend!</h2>
<p>Enter your details and start shopping</p>
<button id="signUp">Sign Up</button>
</div></div>
</div></div>
<script>
window.addEventListener("load",function(){

setTimeout(function(){

document.getElementById("splash").style.opacity="0";

setTimeout(()=>{
document.getElementById("splash").style.display="none";
},500);

},2000);

});
</script>
<script>

const signUpBtn=document.getElementById("signUp");
const signInBtn=document.getElementById("signIn");
const container=document.getElementById("container");

signUpBtn.addEventListener("click",()=>{
container.classList.add("right-panel-active");
});

signInBtn.addEventListener("click",()=>{
container.classList.remove("right-panel-active");
});

</script>
<script type="module" src="login.js"></script>
</body>
</html>
