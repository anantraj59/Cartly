<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login - Cartly</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:25px;
width:320px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin:8px 0;
}

button{
width:100%;
padding:10px;
margin-top:6px;
border:none;
background:black;
color:white;
cursor:pointer;
}

.google{background:#db4437;}
.phone{background:#0f9d58;}
</style>
</head>

<body>

<div class="box">

<h2>Login / Signup</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>

<hr>

<button class="google" onclick="googleLogin()">Continue with Google</button>

<hr>

<input id="phone" placeholder="+91xxxxxxxxxx">

<div id="recaptcha-container"></div>

<button class="phone" onclick="sendOTP()">Send OTP</button>

<input id="otp" placeholder="Enter OTP">
<button onclick="verifyOTP()">Verify OTP</button>

</div>

<script type="module" src="login.js"></script>

</body>
</html>
