<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cartly Login</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
width:330px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
margin-top:8px;
background:black;
color:white;
border:none;
cursor:pointer;
border-radius:5px;
}

.link{
color:blue;
cursor:pointer;
font-size:14px;
text-align:center;
margin-top:10px;
}

</style>

</head>

<body>

<div class="box">

<h2>Login / Sign Up</h2>

<input type="email" id="email" placeholder="Enter Email">

<input type="password" id="password" placeholder="Password">

<input type="password" id="confirmPassword" placeholder="Confirm Password (Signup only)">

<button onclick="signup()">Sign Up</button>

<button onclick="login()">Login</button>

<div class="link" onclick="resetPassword()">
Forgot Password?
</div>

<p id="msg"></p>

</div>

<script type="module" src="login.js"></script>

</body>
</html>
