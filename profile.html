<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Profile - Cartly</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
margin:0;
padding:0;
}

.container{
width:90%;
max-width:900px;
margin:auto;
margin-top:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.order{
border-bottom:1px solid #ddd;
padding:10px 0;
}

button{
background:black;
color:white;
border:none;
padding:8px 15px;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h2>👤 My Profile</h2>

<p id="userName"></p>
<p id="userEmail"></p>

<button id="logoutBtn">Logout</button>

</div>

<div class="card">

<h2>📦 My Orders</h2>

<div id="orders"></div>

</div>

</div>

<script type="module" src="profile.js"></script>

</body>
</html>
