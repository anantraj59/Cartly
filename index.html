
<!DOCTYPE html>

</head>
<body>

<header>
  <div class="logo-container">
    <img src="1.jpg" alt="Cartly Logo" class="logo">
  </div>
  <h1>Cartly</h1>
  <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
</header>
<a href="admin.html">
<button>Admin Panel</button>
</a>
<div id="filters">
  <button onclick="filterCategory('all')">All</button>
  <button onclick="filterCategory('car')">Car</button>

<script type="module">

  authDomain: "cartly-store.firebaseapp.com",
  projectId: "cartly-store",
  storageBucket: "cartly-store.firebasestorage.app",
  messagingSenderId: "836220022823",
  appId: "1:836220022823:web:ae9155eacd7d777df21e02"

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth,(user)=>{

<script src="script.js"></script>

</html>
