<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartly</title><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff4b2b,#ff416c);
overflow:hidden;
}

/* background circles */

.circle{
position:absolute;
border-radius:50%;
filter:blur(80px);
opacity:0.7;
animation:float 6s infinite alternate;
}

.c1{
width:250px;
height:250px;
background:#ff9a9e;
top:-80px;
left:-80px;
}

.c2{
width:300px;
height:300px;
background:#fad0c4;
bottom:-100px;
right:-100px;
animation-delay:10s;
}

@keyframes float{
from{transform:translateY(0)}
to{transform:translateY(40px)}
}

/* glass card */

.card{
backdrop-filter:blur(15px);
background:rgba(255,255,255,0.15);
border-radius:20px;
padding:40px;
text-align:center;
color:white;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.logo{
font-size:60px;
animation:bounce 1.5s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-12px)}
}

h1{
margin-top:10px;
font-size:34px;
}

p{
margin-top:8px;
opacity:0.8;
}

.loader{
margin-top:20px;
}

.loader span{
display:inline-block;
width:10px;
height:10px;
background:white;
border-radius:50%;
margin:4px;
animation:dot 1.4s infinite;
}

.loader span:nth-child(2){animation-delay:0.2s}
.loader span:nth-child(3){animation-delay:0.4s}

@keyframes dot{
0%,80%,100%{transform:scale(0)}
40%{transform:scale(1)}
}

</style></head><body><div class="circle c1"></div>
<div class="circle c2"></div><div class="card"><div class="logo">🛒</div><h1>Cartly</h1><p>Preparing your shopping experience</p><div class="loader">
<span></span>
<span></span>
<span></span>
</div></div>
<script>
  localStorage.setItem("seenWelcome","true");
setTimeout(()=>{
window.location.href="login.html";
},2000);
</script>
<script>

/* auto redirect */

setTimeout(()=>{
window.location.href="login.html";
},5000)

</script></body>
</html>
