<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartly</title><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:linear-gradient(135deg,#ff7a3d,#ff9b6a);
height:100vh;
overflow-x:hidden;
color:white;
}

.slider{
display:flex;
width:300%;
height:100vh;
transition:0.5s;
}

.slide{
width:100vw;
flex-shrink:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:25px;
}

.slide img{
width:65%;
max-width:240px;
margin-bottom:25px;
}

.desc{
margin-top:10px;
font-size:15px;
opacity:0.9;
max-width:280px;
}

.title{
font-size:26px;
font-weight:bold;
}

.next{
position:absolute;
bottom:25px;
right:20px;
background:white;
color:#ff6a3d;
border:none;
padding:10px 18px;
border-radius:8px;
font-weight:bold;
}

.skip{
position:absolute;
top:25px;
right:20px;
font-size:14px;
opacity:0.9;
}

.btn{
margin-top:35px;
background:white;
color:#ff6a3d;
padding:14px 28px;
border-radius:10px;
border:none;
font-weight:bold;
}

.dots{
position:absolute;
bottom:90px;
width:100%;
text-align:center;
}

.dot{
height:8px;
width:8px;
background:white;
opacity:0.4;
border-radius:50%;
display:inline-block;
margin:4px;
}

.active{
opacity:1;
}

</style></head><body><div class="skip" onclick="goLogin()">Skip</div><div class="slider" id="slider"><div class="slide">
<img src="https://cdn-icons-png.flaticon.com/512/3081/3081985.png">
<div class="title">Welcome to Cartly</div>
<div class="desc">Your smart shopping partner to explore amazing products.</div>
</div><div class="slide">
<img src="https://cdn-icons-png.flaticon.com/512/1170/1170678.png">
<div class="title">Easy Shopping</div>
<div class="desc">Add products to cart and buy with a few taps.</div>
</div><div class="slide">
<img src="https://cdn-icons-png.flaticon.com/512/869/869636.png">
<div class="title">Fast Delivery</div>
<div class="desc">Get your orders delivered quickly to your doorstep.</div><button class="btn" onclick="goLogin()">Start Shopping</button>

</div></div><div class="dots">
<span class="dot active"></span>
<span class="dot"></span>
<span class="dot"></span>
</div><button class="next" onclick="nextSlide()">Next</button>

<script>let index = 0;
const totalSlides = 3;

function nextSlide(){

if(index < totalSlides - 1){
index++;
updateSlide();
}

}

function updateSlide(){

const slider = document.getElementById("slider");
slider.style.transform = "translateX(-" + (index * 100) + "vw)";

let dots = document.querySelectorAll(".dot");

dots.forEach(d => d.classList.remove("active"));

dots[index].classList.add("active");

}
function goLogin(){

localStorage.setItem("seenWelcome","true");
window.location.href="login.html";

}
</script>
</body>
</html>
